services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: brand_tracker
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d brand_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  camoufox:
    build: ./camoufox
    restart: unless-stopped
    ports:
      - "5900:5900"
      - "6080:6080"
    environment:
      CHATGPT_TOTP_SECRET: ${CHATGPT_TOTP_SECRET:-}
      CAMOUFOX_API_KEY: ${CAMOUFOX_API_KEY:-}
      APIFY_PROXY_PASSWORD: ${APIFY_PROXY_PASSWORD:-}
      APIFY_PROXY_COUNTRY: ${APIFY_PROXY_COUNTRY:-US}
    volumes:
      - browser-profile:/tmp/browser-profile
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8888/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      camoufox:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://admin:password@db:5432/brand_tracker
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CHATGPT_EMAIL: ${CHATGPT_EMAIL:-}
      CHATGPT_PASSWORD: ${CHATGPT_PASSWORD:-}
      CHATGPT_TOTP_SECRET: ${CHATGPT_TOTP_SECRET:-}
      CAMOUFOX_URL: http://camoufox:8888
      CAMOUFOX_API_KEY: ${CAMOUFOX_API_KEY:-}
      NODE_ENV: production

volumes:
  pgdata:
  browser-profile:
