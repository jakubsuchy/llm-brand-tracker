services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: brand_tracker
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d brand_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  browser-actor:
    image: ghcr.io/jakubsuchy/llm-prompt-fetch-local:latest
    profiles: ["browser"]
    restart: unless-stopped
    ports:
      - "5900:5900"
      - "6080:6080"
    environment:
      APIFY_META_ORIGIN: STANDBY
      ACTOR_STANDBY_PORT: 8888
      CHATGPT_TOTP_SECRET: ${CHATGPT_TOTP_SECRET:-}
      APIFY_PROXY_PASSWORD: ${APIFY_PROXY_PASSWORD:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  app:
    image: ghcr.io/jakubsuchy/llm-brand-tracker/app:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://admin:password@db:5432/brand_tracker
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CHATGPT_EMAIL: ${CHATGPT_EMAIL:-}
      CHATGPT_PASSWORD: ${CHATGPT_PASSWORD:-}
      CHATGPT_TOTP_SECRET: ${CHATGPT_TOTP_SECRET:-}
      BROWSER_ACTOR_URL: http://browser-actor:8888
      APIFY_TOKEN: ${APIFY_TOKEN:-}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      NODE_ENV: production

volumes:
  pgdata:
