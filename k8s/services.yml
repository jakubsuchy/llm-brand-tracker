apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: llm-brand-tracker
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: camoufox
  namespace: llm-brand-tracker
spec:
  type: ClusterIP
  selector:
    app: camoufox
  ports:
    - name: api
      port: 8888
      targetPort: 8888
    - name: vnc
      port: 5900
      targetPort: 5900
    - name: novnc
      port: 6080
      targetPort: 6080
---
apiVersion: v1
kind: Service
metadata:
  name: app
  namespace: llm-brand-tracker
spec:
  type: ClusterIP
  selector:
    app: app
  ports:
    - port: 3000
      targetPort: 3000
